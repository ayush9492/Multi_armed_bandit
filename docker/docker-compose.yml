version: "3.9"

services:

  # ── FastAPI Bandit API ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bandit_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      # Persist the SQLite DB file on the host so it survives container restarts
      - ../bandit.db:/app/bandit.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bandit_dashboard
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    volumes:
      - ../bandit.db:/app/bandit.db
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped